name: Generate contribution snake

# Builds the animated contribution-snake SVG referenced in the README and
# pushes it to the `output` branch. Runs on a schedule, on push to main, and
# on demand.
on:
  schedule:
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#8B5CF6&color_dots=#0D1117,#06B6D4,#10B981,#8B5CF6,#FFFFFF
            dist/github-snake.svg?palette=github-light&color_snake=#8B5CF6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
