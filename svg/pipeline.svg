<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" width="100%" role="img" aria-label="AI pipeline">
    <style>
      .pf { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif; }
      .stage { animation: lift 5s ease-in-out infinite; transform-origin: center; }
      @keyframes lift { 0%,100%{opacity:.78} 50%{opacity:1} }
      .glowbox { stroke-dasharray: 720; animation: trace 5s linear infinite; }
      @keyframes trace { to { stroke-dashoffset: -720; } }
      .tok { animation: travel 5s ease-in-out infinite; }
      @keyframes travel {
        0%   { transform: translateY(0);   opacity: 0; }
        8%   { opacity: 1; }
        92%  { opacity: 1; }
        100% { transform: translateY(400px); opacity: 0; }
      }
    </style>
    
    <defs>
      <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#06B6D4"/>
      </linearGradient>
      <filter id="pglow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3"/>
      </filter>
    </defs>
    <rect width="520" height="560" fill="#0D1117" rx="14"/><line x1="260" y1="118" x2="260" y2="160" stroke="#2b3340" stroke-width="2"/><path d="M260 160 l-5 -7 h10 z" fill="#2b3340"/><line x1="260" y1="218" x2="260" y2="260" stroke="#2b3340" stroke-width="2"/><path d="M260 260 l-5 -7 h10 z" fill="#2b3340"/><line x1="260" y1="318" x2="260" y2="360" stroke="#2b3340" stroke-width="2"/><path d="M260 360 l-5 -7 h10 z" fill="#2b3340"/><line x1="260" y1="418" x2="260" y2="460" stroke="#2b3340" stroke-width="2"/><path d="M260 460 l-5 -7 h10 z" fill="#2b3340"/><circle class="tok" cx="260" cy="118" r="4.5" fill="#06B6D4" filter="url(#pglow)" style="animation-delay:0.0s"/><circle class="tok" cx="260" cy="118" r="4.5" fill="#06B6D4" filter="url(#pglow)" style="animation-delay:2.5s"/><g class="stage" style="animation-delay:0.0s"><rect x="110" y="60" width="300" height="58" rx="12" fill="#11161D" stroke="#222a35" stroke-width="1"/><rect class="glowbox" x="110" y="60" width="300" height="58" rx="12" fill="none" stroke="url(#pg)" stroke-width="1.6" style="animation-delay:0.0s"/><text class="pf" x="260" y="96" text-anchor="middle" font-size="19" font-weight="600" fill="#FFFFFF">Dataset</text></g><g class="stage" style="animation-delay:1.0s"><rect x="110" y="160" width="300" height="58" rx="12" fill="#11161D" stroke="#222a35" stroke-width="1"/><rect class="glowbox" x="110" y="160" width="300" height="58" rx="12" fill="none" stroke="url(#pg)" stroke-width="1.6" style="animation-delay:-1.0s"/><text class="pf" x="260" y="196" text-anchor="middle" font-size="19" font-weight="600" fill="#FFFFFF">Embedding</text></g><g class="stage" style="animation-delay:2.0s"><rect x="110" y="260" width="300" height="58" rx="12" fill="#11161D" stroke="#222a35" stroke-width="1"/><rect class="glowbox" x="110" y="260" width="300" height="58" rx="12" fill="none" stroke="url(#pg)" stroke-width="1.6" style="animation-delay:-2.0s"/><text class="pf" x="260" y="296" text-anchor="middle" font-size="19" font-weight="600" fill="#FFFFFF">Self-Attention</text></g><g class="stage" style="animation-delay:3.0s"><rect x="110" y="360" width="300" height="58" rx="12" fill="#11161D" stroke="#222a35" stroke-width="1"/><rect class="glowbox" x="110" y="360" width="300" height="58" rx="12" fill="none" stroke="url(#pg)" stroke-width="1.6" style="animation-delay:-3.0s"/><text class="pf" x="260" y="396" text-anchor="middle" font-size="19" font-weight="600" fill="#FFFFFF">Reasoning</text></g><g class="stage" style="animation-delay:4.0s"><rect x="110" y="460" width="300" height="58" rx="12" fill="#11161D" stroke="#222a35" stroke-width="1"/><rect class="glowbox" x="110" y="460" width="300" height="58" rx="12" fill="none" stroke="url(#pg)" stroke-width="1.6" style="animation-delay:-4.0s"/><text class="pf" x="260" y="496" text-anchor="middle" font-size="19" font-weight="600" fill="#FFFFFF">Output</text></g></svg>