<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 130" width="100%" role="img" aria-label="footer">
    <style>
      .ft { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif; }
      .shine { animation: sweep 5s linear infinite; }
      @keyframes sweep { 0%{transform:translateX(-260px)} 100%{transform:translateX(1260px)} }
      .ln { stroke-dasharray: 6 8; animation: flow2 3s linear infinite; }
      @keyframes flow2 { to { stroke-dashoffset: -28; } }
    </style>
    
    <defs>
      <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#8B5CF6"/>
        <stop offset="50%" stop-color="#06B6D4"/>
        <stop offset="100%" stop-color="#10B981"/>
      </linearGradient>
      <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
        <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="txtClip">
        <text x="500" y="64" text-anchor="middle" font-size="34" font-weight="800"
              font-family="'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif">Training models. Building intelligence. Shaping the future.</text>
      </clipPath>
    </defs>
    <rect width="1000" height="130" fill="#0D1117" rx="12"/><text class="ft" x="500" y="64" text-anchor="middle" font-size="34" font-weight="800" fill="url(#fg)">Training models. Building intelligence. Shaping the future.</text><g clip-path="url(#txtClip)"><rect class="shine" x="-260" y="20" width="180" height="70" fill="url(#shineGrad)"/></g><line class="ln" x1="320" y1="92" x2="680" y2="92" stroke="url(#fg)" stroke-width="2"/><circle cx="320" cy="92" r="3.5" fill="#8B5CF6"/><circle cx="680" cy="92" r="3.5" fill="#10B981"/></svg>