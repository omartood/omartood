<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="100%" role="img" aria-label="Omar Tood — AI Researcher">
    <style>
      .edge {
        stroke: url(#edgeGrad);
        stroke-width: 1.1;
        stroke-dasharray: 5 9;
        opacity: 0.55;
        animation: flow 2.6s linear infinite;
      }
      @keyframes flow { to { stroke-dashoffset: -28; } }
      .node { animation: pulse 3.2s ease-in-out infinite; transform-origin: center; }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .particle {
        opacity: 0;
        animation-name: drift;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }
      @keyframes drift {
        0%   { transform: translateY(0) scale(1);   opacity: 0; }
        12%  { opacity: 0.9; }
        88%  { opacity: 0.9; }
        100% { transform: translateY(-440px) scale(0.4); opacity: 0; }
      }
      .title { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', system-ui, -apple-system, sans-serif; }
    </style>
    
    <defs>
      <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#8B5CF6">
          <animate attributeName="stop-color" values="#8B5CF6;#06B6D4;#8B5CF6" dur="6s" repeatCount="indefinite"/>
        </stop>
        <stop offset="55%" stop-color="#06B6D4">
          <animate attributeName="stop-color" values="#06B6D4;#10B981;#06B6D4" dur="6s" repeatCount="indefinite"/>
        </stop>
        <stop offset="100%" stop-color="#10B981">
          <animate attributeName="stop-color" values="#10B981;#8B5CF6;#10B981" dur="6s" repeatCount="indefinite"/>
        </stop>
      </linearGradient>
      <linearGradient id="edgeGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#06B6D4"/>
        <stop offset="50%" stop-color="#8B5CF6"/>
        <stop offset="100%" stop-color="#10B981"/>
      </linearGradient>
      <radialGradient id="vignette" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#0D1117" stop-opacity="0.95"/>
        <stop offset="55%" stop-color="#0D1117" stop-opacity="0.78"/>
        <stop offset="100%" stop-color="#0D1117" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="blobP" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.30"/>
        <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="blobC" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
      </radialGradient>
      <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
        <feGaussianBlur stdDeviation="3.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
